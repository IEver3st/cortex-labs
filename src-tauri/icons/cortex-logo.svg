<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
    <!-- Isometric Cube Base -->
    <polygon points="100,40 150,70 150,130 100,160 50,130 50,70" fill="none" stroke="#1B1B19" stroke-width="2"></polygon>
    <polygon points="100,40 150,70 100,100 50,70" fill="#526862"></polygon>
    <polygon points="50,70 100,100 100,160 50,130" fill="#D65D45"></polygon>
    <polygon points="150,70 150,130 100,160 100,100" fill="#E1BFA4"></polygon>
    <line x1="100" y1="100" x2="100" y2="160" stroke="#1B1B19" stroke-width="2"></line>
    <polyline points="50,70 100,100 150,70" fill="none" stroke="#1B1B19" stroke-width="2"></polyline>
</svg>
